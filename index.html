<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chroma Theme Lab</title>
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('chroma-theme-mode');
          var media = window.matchMedia('(prefers-color-scheme: dark)');
          var systemTheme = media.matches ? 'dark' : 'light';
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var applied = mode === 'system' ? systemTheme : mode;
          document.documentElement.dataset.theme = applied;
          document.documentElement.dataset.themeMode = mode;
        } catch (error) {
          // graceful fallback for non-browser environments
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
